<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orijinz Member Header</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12; --bg2: #151519;
    --border: #2a2a34;
    --text: #e0e0e8; --text-dim: #808898;
    --gold: #f0c860;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Nunito Sans', sans-serif;
    overflow-x: hidden;
  }

  /* NAV BAR */
  .nav-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    max-width: 960px; margin: 0 auto;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-spacer { flex: 1; }

  /* MENU OVERLAY */
  .menu-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 500;
  }
  .menu-overlay.open { display: block; }
  .menu-panel {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(300px, 80vw);
    background: var(--bg2); border-right: 1px solid var(--border);
    z-index: 501; overflow-y: auto;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  .menu-overlay.open .menu-panel { transform: translateX(0); }
  .menu-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .menu-title {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 1rem; color: var(--text);
  }
  .menu-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer;
  }
  .menu-items { padding: 8px 0; }
  .menu-item {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 12px 20px; background: none; border: none;
    font-family: 'Nunito Sans', sans-serif; font-size: 0.88rem;
    color: var(--text-dim); cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .menu-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .menu-item svg { opacity: 0.6; flex-shrink: 0; }
  .menu-item:hover svg { opacity: 1; }
  .menu-divider { height: 1px; background: var(--border); margin: 8px 20px; }
  .menu-section-label {
    font-size: 0.55rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    padding: 12px 20px 4px; opacity: 0.6;
  }
</style>
</head>
<body>

<!-- Menu overlay -->

  <nav class="menu-panel" onclick="event.stopPropagation()">
    <div class="menu-header">

      <a class="menu-item" href="https://www.entspire.com/odwordsandphrases" target="_top">🔤 Words &amp; Phrases</a>
      <a class="menu-item" href="https://www.entspire.com/od70s-songs" target="_top">🎵 70s Songs</a>

<!-- NAV BAR -->
<div class="nav-bar">
  <button class="nav-btn" onclick="goBack()" aria-label="Back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>

  <button class="nav-btn" onclick="openMenu()" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="nav-spacer"></div>
</div>

<script>
  function openMenu() { document.getElementById('menuOverlay').classList.add('open'); }
  function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }
  function goBack() {
    // Use parent (Wix page) history, not the iframe's
    try {
      if (window.parent && window.parent !== window) {
        window.parent.history.back();
        return;
      }
    } catch (e) {}
    history.back();
  }
</script>
</body>
</html>
